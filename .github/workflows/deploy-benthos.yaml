
# .github/workflows/deploy-benthos.yml
name: Deploy Benthos to Local Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'benthos/**'           # only trigger when benthos config changes
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  RELEASE_NAME: my-benthos
  NAMESPACE: default
  HELM_REPO: https://benthosdev.github.io/charts/

jobs:
  deploy:
    name: Deploy Benthos via Helm
    runs-on: [self-hosted, macOS, X64]       # uses your local machine as the runner

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up kubeconfig from GitHub secret
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # 3. Verify cluster connectivity
      - name: Verify Kubernetes cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      # 4. Install/upgrade Helm
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      # 5. Add the Benthos Helm repo
      - name: Add Benthos Helm repo
        run: |
          helm repo add benthos ${{ env.HELM_REPO }}
          helm repo update

      # 6. Deploy / upgrade Benthos
      - name: Deploy Benthos with Helm
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} benthos/benthos \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values benthos/values.yaml \
            --wait \
            --timeout 120s

      # 7. Verify deployment
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ env.RELEASE_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=60s

      # 8. Show logs (last 20 lines)
      - name: Show Benthos logs
        run: |
          kubectl logs deployment/${{ env.RELEASE_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --tail=20
        continue-on-error: true   # don't fail the workflow if pod isn't logging yet